name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 5 * * 1,4'  # Mon+Thu 05:00 UTC — keeps uv cache alive on main (< 7-day eviction window)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Install dependencies
        run: uv sync

      - name: Check
        run: make check

  integration-ssh:
    name: integration-ssh (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Install dependencies
        run: uv sync

      - name: Start SSH target
        run: eval "$(scripts/start-ssh-target.sh)" && env | grep TERRIBLE_SSH >> "$GITHUB_ENV"

      - name: Run integration tests over SSH
        run: make integration-test
