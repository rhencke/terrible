name: Build Binary

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 */6 * *'  # every 6 days — keeps ccache alive before the 7-day expiry

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build Nuitka binary
        uses: ./.github/actions/build-nuitka

      - name: Smoke test binary
        run: |
          ls -lh dist/terraform-provider-terrible
          # Start in dev mode; verify it emits TF_REATTACH_PROVIDERS within 10s
          timeout 10 dist/terraform-provider-terrible --dev 2>&1 | grep -q TF_REATTACH_PROVIDERS
