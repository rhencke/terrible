name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.6.2)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Normalize tag name for both push and workflow_dispatch triggers
  TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  # ── Stage 1: validate on all platforms ────────────────────────────────────
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true   # one failure blocks the release
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # OpenTofu has no arm64 Linux binary in the setup action yet
      - name: Install OpenTofu
        if: "!(matrix.goos == 'linux' && matrix.goarch == 'arm64')"
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Install dependencies
        run: uv sync

      - name: Unit tests (100% coverage required)
        run: uv run pytest tests/ --ignore=tests/integration -q

      - name: Integration tests
        if: "!(matrix.goos == 'linux' && matrix.goarch == 'arm64')"
        run: make integration-test

      - name: Build Nuitka binary
        run: |
          uv run python -m nuitka \
            --onefile \
            --jobs=1 \
            --assume-yes-for-downloads \
            --include-package=ansible \
            --include-package=ansible_collections \
            --include-package=tf \
            --include-package=grpc \
            --include-package=jinja2 \
            --include-package=cryptography \
            --include-package=terrible_provider \
            --include-package-data=ansible \
            --include-package-data=ansible_collections \
            --include-package-data=tf \
            --include-package-data=jinja2 \
            --include-package-data=cryptography \
            --output-filename=terraform-provider-terrible \
            --output-dir=dist \
            _terrible_main.py

      - name: Determine binary name and zip path
        id: names
        shell: bash
        run: |
          VERSION="${TAG_NAME#v}"
          BINARY="terraform-provider-terrible_v${VERSION}"
          ZIP="terraform-provider-terrible_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          echo "binary=${BINARY}" >> "$GITHUB_OUTPUT"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Rename binary
        shell: bash
        run: mv "dist/terraform-provider-terrible" "dist/${{ steps.names.outputs.binary }}"

      - name: Zip binary
        shell: bash
        run: |
          cd dist
          zip "../${{ steps.names.outputs.zip }}" "${{ steps.names.outputs.binary }}"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.names.outputs.zip }}
          path: ${{ steps.names.outputs.zip }}
          if-no-files-found: error

  # ── Stage 2: draft release (only if ALL validate jobs pass) ──────────────
  # Creates a draft GitHub release with all assets. Draft releases are invisible
  # to the Terraform Registry. A subsequent job (publish) will promote it once
  # per-platform binary validation passes (see issues #44 and #45).
  draft:
    name: draft
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all platform zips
        uses: actions/download-artifact@v4
        with:
          path: zips
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          VERSION="${TAG_NAME#v}"
          cd zips
          cp "${GITHUB_WORKSPACE}/terraform-registry-manifest.json" \
             "terraform-provider-terrible_${VERSION}_manifest.json"
          sha256sum *.zip *_manifest.json > "terraform-provider-terrible_${VERSION}_SHA256SUMS"
          cat "terraform-provider-terrible_${VERSION}_SHA256SUMS"

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        env:
          GPG_TTY: /dev/null

      - name: Sign SHA256SUMS
        run: |
          VERSION="${TAG_NAME#v}"
          cd zips
          gpg --batch --yes --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --pinentry-mode loopback \
              --detach-sign \
              --output "terraform-provider-terrible_${VERSION}_SHA256SUMS.sig" \
              "terraform-provider-terrible_${VERSION}_SHA256SUMS"

      - name: Create draft release and upload assets
        id: create
        run: |
          NOTES="$(git tag -l --format='%(contents)' "${TAG_NAME}")"
          TITLE="$(echo "${NOTES}" | awk 'NF{print; exit}')"
          gh release create "${TAG_NAME}" \
            --title "${TITLE:-${TAG_NAME}}" \
            --notes "${NOTES:-${TAG_NAME}}" \
            --draft \
            zips/*.zip zips/*_manifest.json zips/*_SHA256SUMS zips/*_SHA256SUMS.sig
          # Output the release ID so validate_binary can download by ID (draft releases
          # are not accessible by tag name via gh release download)
          RELEASE_ID="$(gh api repos/${GITHUB_REPOSITORY}/releases --jq \
            ".[] | select(.tag_name == \"${TAG_NAME}\" and .draft == true) | .id" | head -1)"
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Stage 3: binary validation (all platforms, against draft release) ────
  # Downloads the actual shipped binary from the draft release and runs
  # integration tests against it — catches packaging bugs missed by source tests.
  validate_binary:
    name: validate binary (${{ matrix.os }})
    needs: [draft]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # OpenTofu has no arm64 Linux binary in the setup action yet
      - name: Install OpenTofu
        if: "!(matrix.goos == 'linux' && matrix.goarch == 'arm64')"
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Install test dependencies
        run: uv sync

      - name: Download binary from draft release
        run: |
          VERSION="${TAG_NAME#v}"
          ZIP="terraform-provider-terrible_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          mkdir -p /tmp/release-bin
          # Draft releases are not accessible by tag name; use the release ID from the draft job
          ASSET_URL="$(gh api repos/${GITHUB_REPOSITORY}/releases/${{ needs.draft.outputs.release_id }}/assets \
            --jq ".[] | select(.name == \"${ZIP}\") | .url")"
          curl -fsSL -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/octet-stream" \
            "${ASSET_URL}" -o "/tmp/release-bin/${ZIP}"
          cd /tmp/release-bin && unzip "${ZIP}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install binary as Terraform provider
        run: |
          VERSION="${TAG_NAME#v}"
          PLUGIN_DIR="${HOME}/.terraform.d/plugins/local/terrible/terrible/0.0.1/${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "${PLUGIN_DIR}"
          cp "/tmp/release-bin/terraform-provider-terrible_v${VERSION}" \
             "${PLUGIN_DIR}/terraform-provider-terrible_v0.0.1"
          chmod +x "${PLUGIN_DIR}/terraform-provider-terrible_v0.0.1"

      - name: Run integration tests against shipped binary
        if: "!(matrix.goos == 'linux' && matrix.goarch == 'arm64')"
        run: |
          VERSION="${TAG_NAME#v}"
          # install_provider derives zip names from the binary filename, so it must
          # be named "terraform-provider-terrible" (no version suffix) for tofu init
          # to find it in the filesystem mirror.
          CLEAN_BIN="/tmp/release-bin/terraform-provider-terrible"
          ln -sf "/tmp/release-bin/terraform-provider-terrible_v${VERSION}" "${CLEAN_BIN}"
          export TERRIBLE_PROVIDER_BIN="${CLEAN_BIN}"
          make integration-test

  # ── Stage 4: publish (only if ALL binary validations pass) ────────────────
  publish:
    name: publish
    needs: [validate_binary, draft]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Publish draft release
        run: |
          PRERELEASE=""
          if [[ "${TAG_NAME}" =~ -(rc|alpha|beta)[0-9]*$ ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release edit "${TAG_NAME}" --draft=false ${PRERELEASE}
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Stage 5: registry validation (after publish) ─────────────────────────
  # Polls registry.terraform.io until the new version is ingested, then
  # downloads the platform-specific binary via tofu init and runs the full
  # integration test suite against it. Validates the end-to-end publish
  # round-trip on each platform.
  validate_registry:
    name: validate registry (${{ matrix.os }})
    needs: [publish]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # OpenTofu has no arm64 Linux binary in the setup action yet
      - name: Install OpenTofu
        if: "!(matrix.goos == 'linux' && matrix.goarch == 'arm64')"
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Install test dependencies
        run: uv sync

      - name: Poll registry and download via tofu init
        if: "!(matrix.goos == 'linux' && matrix.goarch == 'arm64')"
        run: |
          VERSION="${TAG_NAME#v}"
          mkdir -p /tmp/registry-check

          # Force direct registry access — suppress any dev_overrides or
          # filesystem mirrors that might be present in the runner environment.
          cat > /tmp/registry-check/.terraformrc <<'TFRC'
          provider_installation {
            direct {}
          }
          TFRC

          cat > /tmp/registry-check/main.tf <<EOF
          terraform {
            required_providers {
              terrible = {
                source  = "registry.terraform.io/rhencke/terrible"
                version = "= ${VERSION}"
              }
            }
          }
          EOF
          echo "Polling registry.terraform.io for rhencke/terrible v${VERSION} via tofu init..."
          for i in $(seq 1 60); do
            if TF_CLI_CONFIG_FILE=/tmp/registry-check/.terraformrc \
               tofu -chdir=/tmp/registry-check init -no-color 2>&1; then
              # Verify the lock file contains exactly the expected version
              if grep -q "\"${VERSION}\"" /tmp/registry-check/.terraform.lock.hcl 2>/dev/null; then
                echo "Version ${VERSION} confirmed on registry.terraform.io."
                exit 0
              fi
              echo "tofu init succeeded but lock file does not contain ${VERSION} — retrying."
            fi
            echo "Attempt ${i}/60: not yet available, waiting 30s..."
            rm -rf /tmp/registry-check/.terraform /tmp/registry-check/.terraform.lock.hcl
            sleep 30
          done
          echo "Timed out waiting for registry to ingest v${VERSION} (30 minutes)."
          exit 1

      - name: Run integration tests against registry binary
        if: "!(matrix.goos == 'linux' && matrix.goarch == 'arm64')"
        run: make registry-test

  # ── Cleanup: delete draft if binary validation failed ─────────────────────
  # Draft releases are invisible to the registry, so it is safe to delete them.
  # The tag remains; cut a new patch version to retry.
  cleanup_on_failure:
    name: cleanup on failure
    needs: [validate_binary, draft]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Delete draft release
        run: |
          echo "Binary validation failed — deleting draft release ${TAG_NAME}."
          gh release delete "${TAG_NAME}" --yes
        env:
          GH_TOKEN: ${{ github.token }}
