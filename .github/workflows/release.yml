name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Stage 1: validate on all platforms ────────────────────────────────────
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true   # one failure blocks the release
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # OpenTofu has no arm64 Linux binary in the setup action yet
      - name: Install OpenTofu
        if: "!(matrix.goos == 'linux' && matrix.goarch == 'arm64')"
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Install dependencies
        run: uv sync

      - name: Unit tests (100% coverage required)
        run: uv run pytest tests/ --ignore=tests/integration -q

      - name: Integration tests
        if: "!(matrix.goos == 'linux' && matrix.goarch == 'arm64')"
        run: make integration-test

      - name: Build PyInstaller binary
        run: uv run pyinstaller terrible.spec --distpath dist --workpath build/pyinstaller --noconfirm

      - name: Determine binary name and zip path
        id: names
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY="terraform-provider-terrible_v${VERSION}"
          ZIP="terraform-provider-terrible_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          echo "binary=${BINARY}" >> "$GITHUB_OUTPUT"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Rename binary
        shell: bash
        run: mv "dist/terraform-provider-terrible" "dist/${{ steps.names.outputs.binary }}"

      - name: Zip binary
        shell: bash
        run: |
          cd dist
          zip "../${{ steps.names.outputs.zip }}" "${{ steps.names.outputs.binary }}"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.names.outputs.zip }}
          path: ${{ steps.names.outputs.zip }}
          if-no-files-found: error

  # ── Stage 2: draft release (only if ALL validate jobs pass) ──────────────
  # Creates a draft GitHub release with all assets. Draft releases are invisible
  # to the Terraform Registry. A subsequent job (publish) will promote it once
  # per-platform binary validation passes (see issues #44 and #45).
  draft:
    name: draft
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Download all platform zips
        uses: actions/download-artifact@v4
        with:
          path: zips
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd zips
          cp "${GITHUB_WORKSPACE}/terraform-registry-manifest.json" \
             "terraform-provider-terrible_${VERSION}_manifest.json"
          sha256sum *.zip *_manifest.json > "terraform-provider-terrible_${VERSION}_SHA256SUMS"
          cat "terraform-provider-terrible_${VERSION}_SHA256SUMS"

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        env:
          GPG_TTY: /dev/null

      - name: Sign SHA256SUMS
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd zips
          gpg --batch --yes --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --pinentry-mode loopback \
              --detach-sign \
              --output "terraform-provider-terrible_${VERSION}_SHA256SUMS.sig" \
              "terraform-provider-terrible_${VERSION}_SHA256SUMS"

      - name: Create draft release and upload assets
        run: |
          NOTES="$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")"
          TITLE="$(echo "${NOTES}" | awk 'NF{print; exit}')"
          gh release create "${GITHUB_REF_NAME}" \
            --title "${TITLE:-${GITHUB_REF_NAME}}" \
            --notes "${NOTES:-${GITHUB_REF_NAME}}" \
            --draft \
            zips/*.zip zips/*_manifest.json zips/*_SHA256SUMS zips/*_SHA256SUMS.sig
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Stage 3: binary validation (all platforms, against draft release) ────
  # Downloads the actual shipped binary from the draft release and runs
  # integration tests against it — catches packaging bugs missed by source tests.
  validate_binary:
    name: validate binary (${{ matrix.os }})
    needs: draft
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # OpenTofu has no arm64 Linux binary in the setup action yet
      - name: Install OpenTofu
        if: "!(matrix.goos == 'linux' && matrix.goarch == 'arm64')"
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Install test dependencies
        run: uv sync

      - name: Download binary from draft release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="terraform-provider-terrible_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          gh release download "${GITHUB_REF_NAME}" --pattern "${ZIP}" --dir /tmp/release-bin
          cd /tmp/release-bin && unzip "${ZIP}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install binary as Terraform provider
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_DIR="${HOME}/.terraform.d/plugins/local/terrible/terrible/0.0.1/${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "${PLUGIN_DIR}"
          cp "/tmp/release-bin/terraform-provider-terrible_v${VERSION}" \
             "${PLUGIN_DIR}/terraform-provider-terrible_v0.0.1"
          chmod +x "${PLUGIN_DIR}/terraform-provider-terrible_v0.0.1"

      - name: Run integration tests against shipped binary
        if: "!(matrix.goos == 'linux' && matrix.goarch == 'arm64')"
        run: make integration-test

  # ── Stage 4: publish (only if ALL binary validations pass) ────────────────
  publish:
    name: publish
    needs: validate_binary
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Publish draft release
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false
        env:
          GH_TOKEN: ${{ github.token }}
