name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Stage 1: validate on all platforms ────────────────────────────────────
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true   # one failure blocks the release
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # OpenTofu has no arm64 Linux binary in the setup action yet
      - name: Install OpenTofu
        if: "!(matrix.goos == 'linux' && matrix.goarch == 'arm64')"
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Install dependencies
        run: uv sync

      - name: Unit tests (100% coverage required)
        run: uv run pytest tests/ --ignore=tests/integration -q

      - name: Integration tests
        if: "!(matrix.goos == 'linux' && matrix.goarch == 'arm64')"
        run: make integration-test

      - name: Build PyInstaller binary
        run: uv run pyinstaller terrible.spec --distpath dist --workpath build/pyinstaller --noconfirm

      - name: Determine binary name and zip path
        id: names
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY="terraform-provider-terrible_v${VERSION}"
          ZIP="terraform-provider-terrible_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          echo "binary=${BINARY}" >> "$GITHUB_OUTPUT"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Rename binary
        shell: bash
        run: mv "dist/terraform-provider-terrible" "dist/${{ steps.names.outputs.binary }}"

      - name: Zip binary
        shell: bash
        run: |
          cd dist
          zip "../${{ steps.names.outputs.zip }}" "${{ steps.names.outputs.binary }}"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.names.outputs.zip }}
          path: ${{ steps.names.outputs.zip }}
          if-no-files-found: error

  # ── Stage 2: generate docs (runs on ubuntu-latest after all validate jobs pass) ──
  docs:
    name: generate docs
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Install dependencies
        run: uv sync

      - name: Install provider locally
        run: make install-provider

      - name: Install tfplugindocs
        run: |
          curl -fsSL https://github.com/hashicorp/terraform-plugin-docs/releases/download/v0.20.0/tfplugindocs_0.20.0_linux_amd64.zip -o /tmp/tfplugindocs.zip
          unzip -o /tmp/tfplugindocs.zip tfplugindocs -d /usr/local/bin

      - name: Generate docs
        run: scripts/generate-docs.sh

      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No doc changes to commit"
          else
            git commit -m "docs: regenerate Terraform Registry docs for ${GITHUB_REF_NAME}"
            git push origin HEAD:main
          fi

  # ── Stage 3: publish (only if ALL validate and docs jobs pass) ─────────────
  publish:
    name: publish
    needs: [validate, docs]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release if it does not exist
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" &>/dev/null; then
            NOTES="$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")"
            TITLE="$(echo "${NOTES}" | awk 'NF{print; exit}')"
            gh release create "${GITHUB_REF_NAME}" \
              --title "${TITLE:-${GITHUB_REF_NAME}}" \
              --notes "${NOTES:-${GITHUB_REF_NAME}}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download all platform zips
        uses: actions/download-artifact@v4
        with:
          path: zips
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd zips
          sha256sum *.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        env:
          GPG_TTY: /dev/null

      - name: Sign SHA256SUMS
        run: |
          cd zips
          gpg --batch --yes --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --pinentry-mode loopback \
              --detach-sign --armor --output SHA256SUMS.sig SHA256SUMS

      - name: Upload release assets
        run: |
          gh release upload "${GITHUB_REF_NAME}" zips/*.zip zips/SHA256SUMS zips/SHA256SUMS.sig
        env:
          GH_TOKEN: ${{ github.token }}
